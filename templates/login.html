<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログイン｜社内アンケートシステム</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-wrapper">
  <div class="login-box">
    <h1 class="login-title">社内アンケートシステム</h1>
    <p class="login-sub">メールアドレスとパスワードでログインしてください</p>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <div class="form-group">
        <label class="form-label" for="email">
          メールアドレス <span class="required-badge">必須</span>
        </label>
        <input id="email" name="email" type="email" class="form-control"
               placeholder="example@example.com" required autofocus>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">
          パスワード <span class="required-badge">必須</span>
        </label>
        <input id="password" name="password" type="password" class="form-control"
               placeholder="パスワードを入力" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;padding:10px;">
        ログイン
      </button>
    </form>
  </div>
</div>
</body>
</html>
