{% extends "base.html" %}
{% block title %}アンケート作成｜社内アンケートシステム{% endblock %}

{% block content %}
<h1 class="page-title">アンケート作成</h1>

{% if errors %}
<div class="error-list">
  <strong>入力エラーがあります</strong>
  <ul>
    {% for e in errors %}<li>{{ e }}</li>{% endfor %}
  </ul>
</div>
{% endif %}

<form method="post" id="createForm">
  <input type="hidden" name="question_count" id="question_count" value="1">

  <!-- 基本情報 -->
  <div class="card">
    <h2 class="card-title">基本情報</h2>

    <div class="form-group">
      <label class="form-label" for="title">
        アンケートタイトル <span class="required-badge">必須</span>
      </label>
      <input id="title" name="title" type="text" class="form-control"
             placeholder="アンケートのタイトルを入力してください">
    </div>

    <div class="form-group">
      <label class="form-label" for="description">説明文</label>
      <textarea id="description" name="description" class="form-control"
                placeholder="アンケートの目的・補足事項など（任意）"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label" for="deadline">回答期限</label>
      <input id="deadline" name="deadline" type="datetime-local" class="form-control"
             style="width:240px;">
      <p class="form-hint">未入力の場合は期限なしとして扱います</p>
    </div>
  </div>

  <!-- 質問一覧 -->
  <div class="card">
    <h2 class="card-title">質問項目</h2>
    <div id="questions-container"></div>
    <button type="button" class="btn btn-outline mt-12" onclick="addQuestion()">
      ＋ 質問を追加
    </button>
  </div>

  <div class="flex gap-12">
    <button type="submit" class="btn btn-success" style="padding:10px 32px;font-size:15px;">
      公開する
    </button>
    <a href="{{ url_for('home') }}" class="btn btn-secondary">キャンセル</a>
  </div>
</form>

<script>
let questionCount = 0;

function addQuestion() {
  const idx = questionCount++;
  document.getElementById('question_count').value = questionCount;

  const div = document.createElement('div');
  div.className = 'question-block';
  div.id = `question_block_${idx}`;
  div.innerHTML = `
    <div class="question-block-header">
      <span class="question-num">質問 ${idx + 1}</span>
      <button type="button" class="btn btn-danger btn-sm" onclick="removeQuestion(${idx})">削除</button>
    </div>

    <div class="form-group">
      <label class="form-label">
        質問文 <span class="required-badge">必須</span>
      </label>
      <input name="question_text_${idx}" type="text" class="form-control"
             placeholder="質問文を入力してください">
    </div>

    <div class="form-group">
      <label class="form-label">
        質問形式 <span class="required-badge">必須</span>
      </label>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="question_type_${idx}" value="free_text" checked
                 onchange="onTypeChange(${idx}, this.value)">
          自由入力
        </label>
        <label class="radio-label">
          <input type="radio" name="question_type_${idx}" value="dropdown"
                 onchange="onTypeChange(${idx}, this.value)">
          プルダウン
        </label>
        <label class="radio-label">
          <input type="radio" name="question_type_${idx}" value="yes_no"
                 onchange="onTypeChange(${idx}, this.value)">
          Yes / No
        </label>
      </div>
    </div>

    <div id="options_section_${idx}" class="options-section" style="display:none;">
      <label class="form-label">
        選択肢 <span class="required-badge">必須</span>
        <span class="text-muted text-sm" style="font-weight:normal;">（2件以上）</span>
      </label>
      <input type="hidden" name="option_count_${idx}" id="option_count_${idx}" value="0">
      <div id="options_container_${idx}"></div>
      <button type="button" class="btn btn-outline btn-sm mt-12"
              onclick="addOption(${idx})">＋ 選択肢を追加</button>
    </div>

    <div class="form-group mt-12">
      <label class="form-label">必須 / 任意</label>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="question_required_${idx}" value="required" checked>
          必須
        </label>
        <label class="radio-label">
          <input type="radio" name="question_required_${idx}" value="optional">
          任意
        </label>
      </div>
    </div>
  `;
  document.getElementById('questions-container').appendChild(div);
  // add 2 default options placeholder
}

function removeQuestion(idx) {
  const el = document.getElementById(`question_block_${idx}`);
  if (el) el.remove();
  // Recalculate count from remaining blocks
  const blocks = document.querySelectorAll('[id^="question_block_"]');
  questionCount = blocks.length;
  document.getElementById('question_count').value = questionCount;
  // Re-index hidden option counts so server can parse correctly
  // (simpler: keep original idx in name, server iterates question_count)
}

function onTypeChange(idx, type) {
  const sec = document.getElementById(`options_section_${idx}`);
  sec.style.display = type === 'dropdown' ? 'block' : 'none';
}

function addOption(idx) {
  const countInput = document.getElementById(`option_count_${idx}`);
  const j = parseInt(countInput.value);
  countInput.value = j + 1;

  const container = document.getElementById(`options_container_${idx}`);
  const row = document.createElement('div');
  row.className = 'option-row';
  row.id = `option_row_${idx}_${j}`;
  row.innerHTML = `
    <input type="text" name="option_${idx}_${j}" class="form-control"
           placeholder="選択肢 ${j + 1}">
    <button type="button" class="btn btn-danger btn-sm"
            onclick="removeOption(${idx}, ${j})">削除</button>
  `;
  container.appendChild(row);
}

function removeOption(idx, j) {
  const el = document.getElementById(`option_row_${idx}_${j}`);
  if (el) el.remove();
}

// サーバーから question_count を使った submit 時の再カウント
document.getElementById('createForm').addEventListener('submit', function() {
  const blocks = document.querySelectorAll('[id^="question_block_"]');
  document.getElementById('question_count').value = blocks.length;
});

// 初期質問を1件表示
addQuestion();
</script>
{% endblock %}
